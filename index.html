<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Escritos - Dashboard</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 40px; }
        h1 { text-align: center; margin-bottom: 40px; font-weight: 200; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid #333;
            text-decoration: none;
            color: inherit;
        }
        .card:hover { transform: scale(1.05); border-color: #9ba7b5; }
        .preview {
            width: 100%;
            height: 300px;
            background: #9ba7b5; /* El color de tu marca */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            color: #1a1a1a;
            font-size: 12px;
            padding: 20px;
            text-align: center;
        }
        .info { padding: 15px; font-size: 14px; background: #222; }
    </style>
</head>
<body>
    <h1>Mis Plantillas de Post</h1>
    <div class="grid">
        <a href="posts/post1.html" class="card">
            <div class="preview">"No es por lo que eres..."</div>
            <div class="info">Post 01 - Magia</div>
        </a>

        <a href="posts/post2.html" class="card">
            <div class="preview">"Préstame un beso..."</div>
            <div class="info">Post 02 - Besos</div>
        </a>
    </div>
</body>
</html>
